# ============================================================================
# Конфигурация SOP Validator
# ============================================================================
# Credentials для GigaChat хранятся в .env (GIGACHAT_CREDENTIALS).
# Никогда не коммитьте .env в git.
# ============================================================================

gigachat:
  model: "GigaChat-2-Max"
  scope: "GIGACHAT_API_CORP"         # GIGACHAT_API_CORP для корпоративного доступа
  verify_ssl: false                  # внутренний контур Сбера, самоподписанный CA
  timeout_seconds: 30
  max_retries: 3
  retry_backoff_base: 1.0            # секунд; экспоненциальный backoff

architectures:
  zero_shot:
    enabled: true
    temperature: 0.0
    max_tokens: 500

  cot:
    enabled: true
    temperature: 0.3
    max_tokens: 1500

  self_consistency:
    enabled: true
    n_runs: 5
    temperature: 0.7
    max_tokens: 1500
    aggregation_temperature: 0.0     # детерминистическая агрегация open-ответов

judge:
  temperature: 0.0
  max_tokens: 400
  include_sop_context: true          # передавать ли СОП в контекст судье

execution:
  max_workers: 3                     # параллельных потоков по вопросам
  checkpoint_every_n_questions: 20   # промежуточное сохранение Excel
  continue_on_error: true            # продолжать при сбое отдельного вопроса
  random_seed: 42                    # для воспроизводимости (tie-breaks, shuffling)

logging:
  level: "INFO"                      # DEBUG / INFO / WARNING / ERROR
  log_to_file: true
  log_dir: "./logs"
